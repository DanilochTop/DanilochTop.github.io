<!DOCTYPE html>
<html lang="pt-BR">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Daniloch Portfolio</title>
	<link rel="stylesheet" href="style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">
</head>

<body>
	<section class="menu-section">
		<!-- <img src="https://external-preview.redd.it/wii-menu-4k-texture-pack-wiilink-update-v0-MTVxcXFuMjh4MjJkMTDc8c3hEeQcsmiKCHOND6Rcy8zgCZHHayzNsAiMDLsI.png?format=pjpg&auto=webp&s=6ec8319def85488a11b199a7e9f59743414f6fe3" style="position: absolute; width: 100vw; height: 100vh; z-index: 10; opacity: 0.5;"> -->

		<div id="cursor"></div>

		<div class="top">
			<div class="mii-container">
				<img class="mii-img" onload="document.querySelector('.mii-img').classList.add('loaded')"
					src="img/mii.png">
			</div>
		</div>

		<div class="bottom">
			<div class="svg-container">
				<svg class="svg left" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 270"
					preserveAspectRatio="xMidYMid slice">
					<defs>
						<linearGradient id="barFill" x1="0" y1="0" x2="0" y2="1">
							<stop offset="0%" stop-color="#f0f2f5" />
							<stop offset="18%" stop-color="#dcdfe6" />
							<stop offset="42%" stop-color="#c8ccd6" />
							<stop offset="70%" stop-color="#cdd1da" />
							<stop offset="100%" stop-color="#d8dbe3" />
						</linearGradient>

						<!-- Horizontal scan lines to match the Wii's brushed plastic look -->
						<pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
							<rect x="0" y="0" width="1" height="1" fill="rgba(255,255,255,0.18)" />
							<rect x="0" y="1" width="1" height="1" fill="rgba(0,0,0,0.04)" />
						</pattern>

						<!-- Soft glow for the cyan stroke -->
						<filter id="strokeGlow" x="-5%" y="-500%" width="110%" height="1100%">
							<feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
							<feMerge>
								<feMergeNode in="blur" />
								<feMergeNode in="blur" />
								<feMergeNode in="SourceGraphic" />
							</feMerge>
						</filter>
					</defs>

					<!-- Silver bar fill -->
					<path d="M -10,10 H 320 C 480,10 480,120 640,120 H 960 V 280 H -10 Z" fill="url(#barFill)"
						style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1" />

					<!-- Scan line texture over the fill -->
					<path d="M -10,10 H 320 C 480,10 480,120 640,120 H 960 V 280 H -10 Z" fill="url(#scanlines)"
						opacity="1"
						style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1" />

					<!-- Top-edge bright highlight (plastic shine) -->
					<line x1="-10" y1="10" x2="320" y2="10" stroke="rgba(255,255,255,0.85)" stroke-width="1.5"
						style="fill:rgb(0, 0, 0);stroke:rgba(255, 255, 255, 0.85);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1" />

					<!-- Shadow just below the cyan stroke -->
					<path d="M -10,14 H 320 C 480,14 480,124 640,124 H 960" fill="none" stroke="rgba(0,50,80,0.18)"
						stroke-width="3" stroke-linecap="round"
						style="fill:none;stroke:rgba(0, 50, 80, 0.18);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:1" />

					<!-- THE cyan stroke — thick, glowing, faithful to reference -->
					<path d="M -10,10 H 320 C 480,10 480,120 640,120 H 960" fill="none" stroke="#3bbcdc"
						stroke-width="3.5" stroke-linecap="round" filter="url(#strokeGlow)"
						style="fill:none;stroke:rgb(59, 188, 220);color:rgb(255, 255, 255);stroke-width:3.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1" />

					<!-- White highlight riding just above the stroke -->
					<path d="M -10,8 H 320 C 480,8 480,118 640,118 H 960" fill="none" stroke="rgba(255,255,255,0.65)"
						stroke-width="1.2" stroke-linecap="round"
						style="fill:none;stroke:rgba(255, 255, 255, 0.65);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1" />
				</svg>

				<svg class="svg right" style="transform: scale(-1, 1);" xmlns="http://www.w3.org/2000/svg"
					viewBox="0 0 960 270" preserveAspectRatio="xMidYMid slice">
					<defs>
						<linearGradient id="barFill" x1="0" y1="0" x2="0" y2="1">
							<stop offset="0%" stop-color="#f0f2f5" />
							<stop offset="18%" stop-color="#dcdfe6" />
							<stop offset="42%" stop-color="#c8ccd6" />
							<stop offset="70%" stop-color="#cdd1da" />
							<stop offset="100%" stop-color="#d8dbe3" />
						</linearGradient>

						<!-- Horizontal scan lines to match the Wii's brushed plastic look -->
						<pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
							<rect x="0" y="0" width="1" height="1" fill="rgba(255,255,255,0.18)" />
							<rect x="0" y="1" width="1" height="1" fill="rgba(0,0,0,0.04)" />
						</pattern>

						<!-- Soft glow for the cyan stroke -->
						<filter id="strokeGlow" x="-5%" y="-500%" width="110%" height="1100%">
							<feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
							<feMerge>
								<feMergeNode in="blur" />
								<feMergeNode in="blur" />
								<feMergeNode in="SourceGraphic" />
							</feMerge>
						</filter>
					</defs>

					<!-- Silver bar fill -->
					<path d="M -10,10 H 320 C 480,10 480,120 640,120 H 960 V 280 H -10 Z" fill="url(#barFill)"
						style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1" />

					<!-- Scan line texture over the fill -->
					<path d="M -10,10 H 320 C 480,10 480,120 640,120 H 960 V 280 H -10 Z" fill="url(#scanlines)"
						opacity="1"
						style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1" />

					<!-- Top-edge bright highlight (plastic shine) -->
					<line x1="-10" y1="10" x2="320" y2="10" stroke="rgba(255,255,255,0.85)" stroke-width="1.5"
						style="fill:rgb(0, 0, 0);stroke:rgba(255, 255, 255, 0.85);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1" />

					<!-- Shadow just below the cyan stroke -->
					<path d="M -10,14 H 320 C 480,14 480,124 640,124 H 960" fill="none" stroke="rgba(0,50,80,0.18)"
						stroke-width="3" stroke-linecap="round"
						style="fill:none;stroke:rgba(0, 50, 80, 0.18);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:1" />

					<!-- THE cyan stroke — thick, glowing, faithful to reference -->
					<path d="M -10,10 H 320 C 480,10 480,120 640,120 H 960" fill="none" stroke="#3bbcdc"
						stroke-width="3.5" stroke-linecap="round" filter="url(#strokeGlow)"
						style="fill:none;stroke:rgb(59, 188, 220);color:rgb(255, 255, 255);stroke-width:3.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1" />

					<!-- White highlight riding just above the stroke -->
					<path d="M -10,8 H 320 C 480,8 480,118 640,118 H 960" fill="none" stroke="rgba(255,255,255,0.65)"
						stroke-width="1.2" stroke-linecap="round"
						style="fill:none;stroke:rgba(255, 255, 255, 0.65);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1" />
				</svg>
			</div>

			<div class="button-container">
				<div class="button-bg left">
					<button></button>
				</div>

				<div class="button-bg right">
					<button></button>
				</div>
			</div>
		</div>
	</section>

	<script src="main.js"></script>
</body>

</html>
